spring:
  application:
    name: transaction-service
  datasource:
    url: jdbc:mysql://localhost:3307/transaction_db
    username: "eyatrooz"
    password: "0000"
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      # tell kafka to handle the string coming from the producer and convert it to bytes, because i convert it the object to string in the publisher class
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

logging:
  level:
    org.apache.kafka.common.config.AbstractConfig: WARN