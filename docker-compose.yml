services:
  mysql-transactions:
    image: mysql:8.0  # relational DB for transaction_db
    environment:
        MYSQL_ROOT_PASSWORD: "0000"
        MYSQL_DATABASE: transaction_db
        MYSQL_USER: "eyatrooz"
        MYSQL_PASSWORD: "0000"
    ports:
      - "3307:3306"   # host:container — avoids clashing with local MySQL on 3306
    volumes:
      - mysql_transactions-data:/var/lib/mysql

  mysql-rule-engine:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "0000"
      MYSQL_DATABASE: rule_engine_db
      MYSQL_USER: "eyatrooz"
      MYSQL_PASSWORD: "0000"

    ports:
      - "3308:3306"
    volumes:
      - mysql_rule_engine_data:/var/lib/mysql


  # kafka broker's self-config
  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

volumes:
  mysql_transactions-data:
  mysql_rule_engine_data:

